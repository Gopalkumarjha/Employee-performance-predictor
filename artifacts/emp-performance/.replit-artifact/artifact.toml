kind = "web"
previewPath = "/"
title = "Employee Performance Prediction System"
version = "1.0.0"
id = "artifacts/emp-performance"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25231

[services.development]
run = "pnpm --filter @workspace/emp-performance run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/emp-performance", "run", "build" ]
publicDir = "artifacts/emp-performance/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25231"
BASE_PATH = "/"
